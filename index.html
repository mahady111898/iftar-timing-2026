<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAMADAN MUBARAK</title>
<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:url("https://images.unsplash.com/photo-1542816417-0983c9c9ad53?auto=format&fit=crop&w=1950&q=80") no-repeat center center fixed;
  background-size:cover;
  color:#fff;
  text-align:center;
}
.overlay{
  min-height:100vh;
  background:rgba(0,0,0,.65);
  padding:20px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}
h1{
  font-size:38px;
  letter-spacing:3px;
  color:#f5c542;
  margin-bottom:15px;
}
.time{
  font-size:36px;
  margin:10px 0;
  color:#f5c542;
}
.box{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:20px;
  flex-wrap:wrap;
}
.card{
  width:140px;
  padding:15px;
  border-radius:15px;
  background:rgba(0,0,0,.6);
}
.green{color:#2ecc71;font-size:20px;}
.red{color:#e74c3c;font-size:20px;}
audio{width:100%;margin-top:10px;}
.tasbeeh button{
  padding:12px 18px;
  margin:5px;
  border:none;
  border-radius:10px;
  font-size:16px;
}
.count{font-size:22px;margin-top:5px;}
.niyat{
  margin-top:20px;
  font-size:18px;
  background:rgba(0,0,0,0.5);
  padding:15px;
  border-radius:10px;
}
.footer{
  margin-top:30px;
  font-size:18px;
  color:#f5c542;
}
button.playbtn{
  padding:12px 25px;
  font-size:16px;
  border:none;
  border-radius:15px;
  background:#1abc9c;
  color:#000;
  margin-top:10px;
}
</style>
</head>

<body onload="getLocation()">

<div class="overlay">

<h1>RAMADAN MUBARAK</h1>
<div id="date"></div>
<div class="time" id="clock">--:--</div>

<div class="box">
  <div class="card">
    <div>সেহরি শেষ</div>
    <div class="green" id="sehriTime">--:--:--</div>
  </div>
  <div class="card">
    <div>ইফতার শুরু</div>
    <div class="red" id="iftarTime">--:--:--</div>
  </div>
</div>

<!-- সূরা রহমান অডিও প্লেয়ার -->
<audio id="surahRahman">
  <source src="https://download.quranicaudio.com/quran/abdul_basit_murattal/055.mp3" type="audio/mpeg">
</audio>

<button onclick="playAudio()">▶ সূরা রহমান শুনুন</button>

  আপনার ব্রাউজার অডিও সাপোর্ট করে না
</audio>
<br>
<button class="playbtn" onclick="document.getElementById('rahmanaudio').play()">▶️ প্লে করুন</button>

<h3 style="margin-top:25px;">তসবিহ</h3>
<div class="tasbeeh">
  <button onclick="subhan()">সুবহানাল্লাহ</button>
  <button onclick="laillah()">লা ইলাহা ইল্লাল্লাহ</button>
  <button onclick="resetTasbeeh()">🔄 রিসেট</button>
  <div class="count" id="count">0</div>
</div>

<div class="niyat">
  <strong>নিয়াত / نية</strong><br>
  আমি রোজা রাখার নিয়ত করছি।<br>
  أُصَوِّمُ صَوْمَ غَدٍ لِلَّهِ تَعَالَى
</div>

<div class="footer">E.S.MAHADY</div>

</div>

<script>
function updateClock(){
  const now=new Date();
  document.getElementById("clock").innerHTML=
    now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById("date").innerHTML=
    now.toLocaleDateString('bn-BD',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
}
setInterval(updateClock,1000);

// Countdown timers
let sehriCountdown, iftarCountdown;

function startCountdown(sehri, iftar){
  clearInterval(sehriCountdown);
  clearInterval(iftarCountdown);

  sehriCountdown = setInterval(()=>{
    let now = new Date();
    let diff = new Date(sehri) - now;
    if(diff < 0) diff = 0;
    let h = Math.floor(diff/1000/60/60);
    let m = Math.floor((diff/1000/60)%60);
    let s = Math.floor((diff/1000)%60);
    document.getElementById("sehriTime").innerText=`${h}h ${m}m ${s}s`;
  },1000);

  iftarCountdown = setInterval(()=>{
    let now = new Date();
    let diff = new Date(iftar) - now;
    if(diff < 0) diff = 0;
    let h = Math.floor(diff/1000/60/60);
    let m = Math.floor((diff/1000/60)%60);
    let s = Math.floor((diff/1000)%60);
    document.getElementById("iftarTime").innerText=`${h}h ${m}m ${s}s`;
  },1000);
}

function getLocation() {
  if (!navigator.geolocation) {
    alert("আপনার ব্রাউজার লোকেশন সাপোর্ট করে না। সেহরি ও ইফতার টাইম দেখানো যাবে না।");
    return;
  }

  navigator.geolocation.getCurrentPosition(
    pos => { loadTimings(pos.coords.latitude, pos.coords.longitude); },
    err => { 
      alert("আপনি লোকেশন অনুমোদন দেননি। সেহরি ও ইফতার টাইম দেখানো হবে না।"); 
    },
    { enableHighAccuracy:false, timeout:10000, maximumAge:600000 }
  );
}

function loadTimings(lat, lon) {
  fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=2&school=1`)
    .then(r => r.json())
    .then(d => {
      let today = d.data.date.gregorian.date;
      let sehriTimeStr = today + " " + d.data.timings.Fajr;
      let iftarTimeStr = today + " " + d.data.timings.Maghrib;

      let sehriDate = new Date(sehriTimeStr);
      let iftarDate = new Date(iftarTimeStr);

      startCountdown(sehriDate, iftarDate);
    });
}

// তসবিহ ফাংশন
let c=0;
function subhan(){ c++; document.getElementById("count").innerText=c; }
function laillah(){ c++; document.getElementById("count").innerText=c; }
function resetTasbeeh(){ c=0; document.getElementById("count").innerText=c; }

</script>

</body>
</html>
