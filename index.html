<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>রমজান ওয়েবসাইট</title>
  <style>
    /* ফ্লুইড ব্যাকগ্রাউন্ড */
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      background: url('https://images.unsplash.com/photo-1609476671522-5c02e55d92b7?auto=format&fit=crop&w=1950&q=80') no-repeat center center fixed;
      background-size: cover;
    }

    /* Container + Dark overlay */
    .container {
      min-height: 100vh;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: rgba(0, 0, 0, 0.55);
      border-radius: 12px;
      margin: 10px;
    }

    h1 {
      font-size: 32px;
      text-align: center;
      margin-bottom: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 18px;
      margin-top: 20px;
    }

    th, td {
      border: 1px solid white;
      padding: 12px;
      text-align: center;
    }

    th {
      background: #145a44;
    }

    /* Timing box */
    #timing {
      text-align: center;
      margin-top: 30px;
      padding: 20px;
      background: rgba(0,0,0,0.5);
      border-radius: 12px;
      font-size: 20px;
    }

    /* Tasbeeh box */
    #tasbeeh {
      text-align: center;
      margin-top: 30px;
      padding: 20px;
      background: rgba(0,0,0,0.4);
      border-radius: 12px;
    }

    #tasbeeh button {
      font-size: 18px;
      padding: 10px 20px;
      margin: 10px;
      border: none;
      border-radius: 8px;
      background: #145a44;
      color: white;
      cursor: pointer;
    }

    #tasbeeh p {
      font-size: 20px;
      margin-top: 10px;
    }

    iframe {
      width: 100%;
      height: 300px;
      border: 0;
      border-radius: 12px;
      margin-top: 20px;    }
  </style>
</head>
<body>
  <div class="container">
    <h1>ইফতার ও সেহরির সময়সূচী</h1>

    <table>
      <tr><th>দিন</th><th>তারিখ</th><th>সেহরি</th><th>ইফতার</th></tr>
      <!-- ৩০ দিনের উদাহরণ -->
      <tr><td>১</td><td>২৪ মার্চ</td><td>04:55 AM</td><td>06:05 PM</td></tr>
      <tr><td>২</td><td>২৫ মার্চ</td><td>04:54 AM</td><td>06:06 PM</td></tr>
      <tr><td>৩</td><td>২৬ মার্চ</td><td>04:53 AM</td><td>06:07 PM</td></tr>
      <!-- বাকি দিনগুলোও একইভাবে বসানো যাবে -->
    </table>

    <!-- Location-based Timing -->
    <div id="timing">
      <p id="sehri">সেহরি: লোড হচ্ছে...</p>
      <p id="iftar">ইফতার: লোড হচ্ছে...</p>
    </div>

    <!-- Google Map -->
    <h2 style="text-align:center; margin-top:30px;"> আপনার লোকেশন</h2>
    <iframe
      src="https://www.google.com/maps?q=Bangladesh&output=embed"
      loading="lazy">
    </iframe>

    <!-- Tasbeeh / Subhanallah -->
    <div id="tasbeeh">
      <p>সুবহানাল্লাহ পড়ুন:</p>
      <button onclick="increment()">মিনহাজে পড়ুন</button>
      <p>গোনা: <span id="count">0</span></p>
    </div>

  </div>

  <!-- JavaScript -->
  <script>
    // Mobile GPS Timing
    navigator.geolocation.getCurrentPosition(function(position){
      const lat = position.coords.latitude;
      const lon = position.coords.longitude;

      fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=2`)
        .then(res => res.json())
        .then(data => {
          document.getElementById('sehri').innerText = "সেহরি: " + data.data.timings.Suhoor;
          document.getElementById('iftar').innerText = "ইফতার: " + data.data.timings.Maghrib;
        });
    }, function(error){
      console.log("Location access denied, showing default times.");
    });

    // Tasbeeh Counter
    let count = 0;
    function increment() {
      count++;
      document.getElementById('count').innerText = count;
    }
  </script>
</body>
</html>
