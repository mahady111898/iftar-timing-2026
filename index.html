<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramadan Mubarak</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#0b0f1a;
  color:#fff;
  text-align:center;
}
.container{
  padding:20px;
}
h1{
  color:#f5c542;
  letter-spacing:2px;
}
.time{
  font-size:40px;
  margin:10px 0;
  color:#f5c542;
}
.box{
  background:rgba(255,255,255,0.08);
  border-radius:12px;
  padding:15px;
  margin:10px 0;
}
.green{color:#00ff9c;}
.red{color:#ff6b6b;}

button{
  padding:12px 20px;
  font-size:16px;
  border:none;
  border-radius:8px;
  background:#20c997;
  color:#fff;
  cursor:pointer;
  margin-top:10px;
}

footer{
  margin-top:25px;
  opacity:0.6;
}
</style>
</head>

<body>

<div class="container">

<h1>RAMADAN<br>MUBARAK</h1>

<div id="date"></div>
<div class="time" id="clock">00:00:00</div>

<div class="box">
  <h3>সেহরি শেষ</h3>
  <div class="green" id="sehriLeft">--</div>
</div>

<div class="box">
  <h3>ইফতার শুরু</h3>
  <div class="red" id="iftarLeft">--</div>
</div>

<!-- অডিও -->
<audio id="surahRahman">
  <source src="https://download.quranicaudio.com/quran/abdul_basit_murattal/055.mp3" type="audio/mpeg">
</audio>

<button onclick="playAudio()">▶ সূরা রহমান শুনুন</button>

<footer>
  E.S.MAHADY
</footer>

</div>
<script>
// সময় ও তারিখ
function updateClock(){
  const now = new Date();
  document.getElementById("clock").innerText =
    now.toLocaleTimeString('en-GB');
  document.getElementById("date").innerText =
    now.toLocaleDateString('bn-BD', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
}
setInterval(updateClock,1000);
updateClock();

// ⚠️ এখানে সময় ঠিক করো (লোকেশন লাগে না)
const sehriTime = "05:00:00";   // সেহরি শেষ
const iftarTime = "18:20:00";  // ইফতার

function countdown(target, elementId){
  const now = new Date();
  const today = now.toISOString().split("T")[0];
  let targetTime = new Date(today + "T" + target);

  if(targetTime < now){
    targetTime.setDate(targetTime.getDate()+1);
  }

  const diff = targetTime - now;
  const h = Math.floor(diff/1000/60/60);
  const m = Math.floor((diff/1000/60)%60);
  const s = Math.floor((diff/1000)%60);

  document.getElementById(elementId).innerText =
    `${h}h ${m}m ${s}s`;
}

setInterval(()=>{
  countdown(sehriTime,"sehriLeft");
  countdown(iftarTime,"iftarLeft");
},1000);

// অডিও প্লে
function playAudio(){
  document.getElementById("surahRahman").play();
}
</script>

</body>
</html>
