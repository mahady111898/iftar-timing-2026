<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramadan Mubarak</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#0b0f1a;
  color:#fff;
  text-align:center;
}
.container{padding:20px;}
h1{color:#f5c542;letter-spacing:2px;}
.time{font-size:40px;color:#f5c542;}
.box{
  background:rgba(255,255,255,0.08);
  border-radius:12px;
  padding:15px;
  margin:12px 0;
}
.green{color:#00ff9c;}
.red{color:#ff6b6b;}
button{
  padding:12px 20px;
  font-size:16px;
  border:none;
  border-radius:8px;
  background:#20c997;
  color:#fff;
  cursor:pointer;
}
footer{margin-top:25px;opacity:.6;}
</style>
</head>

<body onload="getLocation()">

<div class="container">
<h1>RAMADAN<br>MUBARAK</h1>

<div id="date"></div>
<div class="time" id="clock">00:00:00</div>

<div class="box">
  <h3>সেহরি শেষ হতে বাকি</h3>
  <div class="green" id="sehriLeft">--</div>
</div>

<div class="box">
  <h3>ইফতার শুরু হতে বাকি</h3>
  <div class="red" id="iftarLeft">--</div>
</div>

<!-- সূরা রহমান -->
<audio id="surahRahman" controls>
  <source src="https://download.quranicaudio.com/quran/abdul_basit_murattal/055.mp3" type="audio/mpeg">
</audio>

<footer>E.S.MAHADY</footer>
</div>

<script>
let sehriTime="", iftarTime="";

// ঘড়ি ও তারিখ
function updateClock(){
  const now=new Date();
  document.getElementById("clock").innerText=now.toLocaleTimeString('en-GB');
  document.getElementById("date").innerText=
    now.toLocaleDateString('bn-BD',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
}
setInterval(updateClock,1000); updateClock();

// লোকেশন
function getLocation(){
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(
      pos=>loadTimings(pos.coords.latitude,pos.coords.longitude),
      ()=>loadTimings(23.8103,90.4125) // ঢাকা fallback
    );
  }else{
    loadTimings(23.8103,90.4125);
  }
}

// API থেকে সময় আনা
function loadTimings(lat,lon){
fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=2`)
.then(r=>r.json())
.then(d=>{
  sehriTime=d.data.timings.Fajr;
  iftarTime=d.data.timings.Maghrib;
});
}

// কাউন্টডাউন
function countdown(target,el){
  if(!target) return;
  const now=new Date();
  let t=new Date(now.toDateString()+" "+target);
  if(t<now) t.setDate(t.getDate()+1);
  const diff=t-now;
  const h=Math.floor(diff/3600000);
  const m=Math.floor(diff/60000)%60;
  const s=Math.floor(diff/1000)%60;
  document.getElementById(el).innerText=`${h}h ${m}m ${s}s`;
}

setInterval(()=>{
  countdown(sehriTime,"sehriLeft");
  countdown(iftarTime,"iftarLeft");
},1000);
</script>

</body>
</html>
