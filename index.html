<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ইফতার ও সেহরির সময় – বাংলাদেশ ২০২৬</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: url('https://images.unsplash.com/photo-1609476671522-5c02e55d92b7?auto=format&fit=crop&w=1950&q=80') no-repeat center center fixed;
      background-size: cover;
      color: white;
      text-align: center;
    }
    header {
      padding: 50px 20px;
      background: rgba(0,0,0,0.5);
    }
    h1 {
      font-size: 2em;
      margin: 0;
    }
    table {
      width: 90%;
      margin: 20px auto;
      border-collapse: collapse;
      font-size: 1.2em;
      background: rgba(0,0,0,0.4);
    }
    th, td {
      padding: 10px;
      border: 1px solid white;
    }
    th {
      font-weight: bold;
    }
    #timing {
      margin: 20px;
      font-size: 1.5em;
      padding: 10px;
      background: rgba(0,0,0,0.5);
      display: inline-block;
    }
    @media(max-width:600px){
      h1 { font-size: 1.5em; }
      table { font-size: 1em; }
      #timing { font-size: 1.2em; }
    }
  </style>
</head>
<body> 
  <style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  background: url('https://images.unsplash.com/photo-1581320541931-8e3b8e8e0c61')
              no-repeat center center fixed;
  background-size: cover;
}

.container {
  min-height: 100vh;
  padding: 20px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

h1 {
  font-size: 32px;
  text-align: center;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 18px;
}

th, td {
  border: 1px solid white;
  padding: 10px;
  text-align: center;
}

th {
  background: #145a44;
}
  </style> .container {
  background: rgba(0, 0, 0, 0.55);
  border-radius: 12px;
}

<header>
  <h1>বাংলাদেশ – রমজান ২০২৬</h1>
</header>

<div id="timing">
  <p id="sehri">সেহরি: লোড হচ্ছে...</p>
  <p id="iftar">ইফতার: লোড হচ্ছে...</p>
</div>

<table>
  <tr>
    <th>তারিখ</th>
    <th>সেহরি সময়</th>
    <th>ইফতার সময়</th>
  </tr>
  <tr>
    <td>1 রমজান</td>
    <td>04:20 AM</td>
    <td>06:15 PM</td>
  </tr>
  <tr>
    <td>2 রমজান</td>
    <td>04:19 AM</td>
    <td>06:16 PM</td>
  </tr>
  <!-- এখানে চাইলে পুরো রমজান পর্যন্ত দিন যুক্ত করতে পারো -->
</table>

<script>
  // Mobile location-based timing
  navigator.geolocation.getCurrentPosition(function(position){
    const lat = position.coords.latitude;
    const lon = position.coords.longitude;

    fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=2`)
      .then(res => res.json())
      .then(data => {
        document.getElementById('sehri').innerText = "সেহরি: " + data.data.timings.Suhoor;
        document.getElementById('iftar').innerText = "ইফতার: " + data.data.timings.Maghrib;
      });
  }, function(error){
    console.log("Location access denied, showing default times.");
  });
</script>

</body>
</html>
